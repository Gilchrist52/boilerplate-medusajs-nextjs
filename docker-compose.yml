services:
  db:
    image: postgres:16-alpine
    container_name: medusa_db
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: ./medusa
    container_name: medusa_migrate
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://medusa:medusa@db:5432/medusa?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
      NODE_ENV: production
    command: npx medusa db:migrate
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: ./medusa
    container_name: medusa_seed
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://medusa:medusa@db:5432/medusa?sslmode=disable}
      STORE_CORS: ${STORE_CORS:-http://localhost:3000}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:7001}
      AUTH_CORS: ${AUTH_CORS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NODE_ENV: production
    command: npx medusa exec ./src/scripts/seed.ts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

